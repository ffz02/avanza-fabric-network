# ---------------------------------------------------------------------------
# "OrdererOrgs" - Definition of organizations managing orderer nodes
# ---------------------------------------------------------------------------
OrdererOrgs:
  
  - Name: Orderer
    Domain: dxb.com
    Specs:
      - Hostname: orderer0
      - Hostname: orderer1
      - Hostname: orderer2
      - Hostname: orderer3
      - Hostname: orderer4


PeerOrgs:
  
  - Name: org1
    Domain: org1.dxb.com
    EnableNodeOUs: true
    Template:
      Count: 2
    Users:
      Count: 10

  - Name: org2
    Domain: org2.dxb.com
    EnableNodeOUs: true
    Template:
      Count: 2
    Users:
      Count: 10
