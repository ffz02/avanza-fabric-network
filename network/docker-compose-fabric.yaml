      - CORE_PEER_ID=peer1.org1.dxb.com
      - CORE_PEER_ADDRESS=peer1.org1.dxb.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer1.org1.dxb.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.dxb.com:7051
      # - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.org1.dxb.com:9051
      - CORE_PEER_LOCALMSPID=org1MSP
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/peers/peer1.org1.dxb.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/peers/peer1.org1.dxb.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/peers/peer1.org1.dxb.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/users/Admin@org1.dxb.com/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:-admin}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    networks:
      - avanza
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/org1.dxb.com/peers/peer1.org1.dxb.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org1.dxb.com/peers/peer1.org1.dxb.com/tls:/etc/hyperledger/fabric/tls
      - ./chaindata/peer1.org1.dxb.com:/var/hyperledger/production
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    ports:
      - 9051:9051
    # extra_hosts:
    #   - "peer0.org1.dxb.com:192.168.1.57"
    #   # - "peer1.org1.dxb.com:192.168.1.57"
    #   - "peer0.org2.dxb.com:192.168.1.57"
    depends_on:
      - couchdb1


      

  couchdb1:
    container_name: couchdb1
    image: couchdb:3.3.2
    # Populate the COUCHDB_USER and COUCHDB_PASSWORD to set an admin user and password
    # for CouchDB.  This will prevent CouchDB from operating in an "Admin Party" mode.
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
