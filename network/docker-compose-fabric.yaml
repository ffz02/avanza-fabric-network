      - ./chaindata/orderer4.dxb.com:/var/hyperledger/production/orderer
    ports:
      - 11050:11050


  peer0.org1.dxb.com:
    container_name: peer0.org1.dxb.com
    image: hyperledger/fabric-peer:2.5.5
    environment:
      # - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_ENDPOINT=unix:///var/run/docker.sock
      # the following setting starts chaincode containers on the same
      # bridge network as the peers
      # https://docs.docker.com/compose/networking/
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=avanza-fabric-network_avanza
      - FABRIC_LOGGING_SPEC=INFO
      # - FABRIC_LOGGING_SPEC=DEBUG
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      # Allow more time for chaincode container to build on install.
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_PEER_ID=peer0.org1.dxb.com
      - CORE_PEER_ADDRESS=peer0.org1.dxb.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.dxb.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.dxb.com:7051 #CORE_PEER_GOSSIP_BOOTSTRAP=peer1.org1.dxb.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.dxb.com:7051
      - CORE_PEER_LOCALMSPID=org1MSP
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/peers/peer0.org1.dxb.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/peers/peer0.org1.dxb.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/peers/peer0.org1.dxb.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.dxb.com/users/Admin@org1.dxb.com/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER:-admin}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    networks:
      - avanza
    volumes:
      # - /var/run/:/host/var/run/
      - /var/run/docker.sock:/var/run/docker.sock
      - ./crypto-config/peerOrganizations/org1.dxb.com/peers/peer0.org1.dxb.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org1.dxb.com/peers/peer0.org1.dxb.com/tls:/etc/hyperledger/fabric/tls
      - ./chaindata/peer0.org1.dxb.com:/var/hyperledger/production
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    ports:
      - 7051:7051
    # extra_hosts:
    #   # - "peer0.org1.dxb.com:192.168.1.57"
    #   - "peer1.org1.dxb.com:192.168.1.57"
    #   - "peer0.org2.dxb.com:192.168.1.57"
    depends_on:
      - couchdb0


      

  couchdb0:
    container_name: couchdb0
    image: couchdb:3.3.2
    # Populate the COUCHDB_USER and COUCHDB_PASSWORD to set an admin user and password
    # for CouchDB.  This will prevent CouchDB from operating in an "Admin Party" mode.
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    # Comment/Uncomment the port mapping if you want to hide/expose the CouchDB service,
    # for dxb map it to utilize Fauxton User Interface in dev environments.
    ports:
      - "5984:5984"
    networks:
      - avanza
    volumes:
      - ./chaindata/couchdb0:/opt/couchdb/data



  
  peer1.org1.dxb.com:
    container_name: peer1.org1.dxb.com
    image: hyperledger/fabric-peer:2.5.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      # the following setting starts chaincode containers on the same
