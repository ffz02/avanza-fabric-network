      - ./crypto-config/peerOrganizations/org2.dxb.com/peers/peer0.org2.dxb.com/tls:/etc/hyperledger/fabric/tls
      - ./chaindata/peer0.org2.dxb.com:/var/hyperledger/production
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
